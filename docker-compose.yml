version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: mongodb-showcase-backend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
    container_name: mongodb-showcase-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4173:4173"
